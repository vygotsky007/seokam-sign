<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>석암 전자서명 · 제출 현황</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .wrap { max-width:760px; margin:22px auto; padding:0 16px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow); padding:18px 20px; margin-bottom:16px; }
    .card h3 { margin:0 0 4px; font-size:16px; }
    .sub { font-size:13px; color:var(--muted); margin:0 0 14px; }
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px; }
    .stat { background:#f7f9fc; border-radius:10px; padding:11px 13px; }
    .stat .l { font-size:12px; color:var(--muted); } .stat .v { font-size:23px; font-weight:600; }
    .stat.done .l { color:#1c7a40; } .stat.done .v { color:#1c7a40; }
    .row { display:flex; align-items:center; gap:12px; padding:11px 12px; border-bottom:1px solid var(--line); }
    .row:last-child { border-bottom:none; }
    .row .seq { font-size:12px; color:var(--muted); width:28px; }
    .row .who { flex:1; }
    .row .who .nm { font-size:14px; font-weight:500; }
    .row .who .nm.muted { color:var(--muted); font-weight:400; }
    .row .who .tm { font-size:11.5px; color:var(--muted); }
    .chip { font-size:11px; padding:2px 9px; border-radius:11px; white-space:nowrap; }
    .chip.open { background:#eef2f8; color:var(--muted); }
    .chip.done { background:#e6f6ec; color:#1c7a40; }
    .chip.closed { background:#fdeaea; color:var(--req); }
    .chip.expired { background:#fff3da; color:#9a6a00; }
    .rbtn { padding:5px 10px; font-size:12px; border:1px solid var(--line); border-radius:8px; background:#fff; cursor:pointer; }
    .rbtn:hover { border-color:var(--brand); color:var(--brand); }
    .rbtn:disabled { opacity:.4; cursor:not-allowed; }
    .ziprow { display:flex; gap:10px; align-items:center; margin-bottom:12px; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="logo">✍️</span><div><div class="brand-title">석암 전자서명</div><div class="brand-sub">제출 현황</div></div></div>
    <div class="top-actions">
      <span id="storeBadge" class="store-badge">…</span>
      <a id="linksBtn" class="btn" href="#">← 링크 만들기</a>
    </div>
  </header>

  <div class="wrap">
    <div class="card">
      <h3 id="title">문서</h3>
      <p class="sub" id="docSub"></p>
      <div class="stats">
        <div class="stat"><div class="l">전체</div><div class="v" id="stTotal">0</div></div>
        <div class="stat done"><div class="l">작성됨</div><div class="v" id="stDone">0</div></div>
        <div class="stat"><div class="l">미작성</div><div class="v" id="stOpen">0</div></div>
      </div>
      <div class="ziprow">
        <button id="zipBtn" class="btn btn-primary">작성분 일괄 다운로드 (ZIP)</button>
        <button id="reload" class="btn">새로고침</button>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:10px">목록</h3>
      <div id="list"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="/submissions.js"></script>
</body>
</html>
