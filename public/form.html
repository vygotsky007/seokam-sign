<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>석암 전자서명 · 작성</title>
  <style>
    :root { --bg:#f4f6fa; --panel:#fff; --line:#e2e7ef; --ink:#1f2733; --muted:#6b7686; --brand:#2f6df4; --req:#e23b3b; --ok:#1c7a40; --shadow:0 1px 3px rgba(20,30,50,.08),0 6px 18px rgba(20,30,50,.05); }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html,body { margin:0; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--ink); }
    .wrap { max-width:440px; margin:0 auto; padding:14px 12px 120px; }
    .head { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:12px; box-shadow:var(--shadow); }
    .head .logo { font-size:22px; }
    .head h1 { font-size:16px; margin:6px 0 2px; }
    .head .dl { font-size:12px; color:var(--muted); }
    .redo { margin-top:8px; font-size:12px; color:var(--brand); background:#eef4ff; padding:6px 10px; border-radius:8px; }
    .pdfwrap { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:10px; margin-bottom:12px; box-shadow:var(--shadow); }
    .pdfwrap .cap { font-size:12px; color:var(--muted); margin-bottom:8px; text-align:center; }
    .page-wrap { position:relative; margin:0 auto 10px; box-shadow:var(--shadow); line-height:0; }
    .page-wrap canvas { display:block; width:100%; height:auto; border-radius:4px; }
    .ov { position:absolute; inset:0; }
    .fbox { position:absolute; border:2px solid var(--brand); border-radius:4px; background:rgba(47,109,244,.10); }
    .fbox.req { border-color:var(--req); background:rgba(226,59,59,.10); }
    .fbox .num { position:absolute; top:-9px; left:-2px; font-size:10px; line-height:15px; padding:0 5px; border-radius:4px; color:#fff; background:var(--brand); }
    .fbox.req .num { background:var(--req); }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px 16px; box-shadow:var(--shadow); }
    .card h2 { font-size:14px; margin:0 0 12px; }
    .field { margin-bottom:16px; }
    .field:last-child { margin-bottom:4px; }
    .flabel { font-size:13px; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
    .flabel .n { font-size:10px; background:#eef2f8; color:var(--muted); border-radius:8px; padding:1px 6px; }
    .star { color:var(--req); }
    input[type=text] { width:100%; height:40px; border:1px solid var(--line); border-radius:9px; padding:0 12px; font-size:15px; }
    input[type=text]:focus { outline:none; border-color:var(--brand); box-shadow:0 0 0 3px rgba(47,109,244,.12); }
    .copytarget { font-size:13px; color:var(--ink); background:#f3f6fb; border-radius:8px; padding:7px 10px; margin-bottom:6px; }
    .match { font-size:12px; margin-top:4px; }
    .match.ok { color:var(--ok); } .match.no { color:var(--muted); }
    .chk { display:flex; align-items:center; gap:9px; font-size:14px; padding:8px 0; }
    .chk input { width:20px; height:20px; }
    .sigbox { border:1px dashed #b9c4d6; border-radius:10px; background:#fafbfd; position:relative; }
    .sigbox canvas { width:100%; height:150px; display:block; border-radius:10px; touch-action:none; }
    .sigbox .clr { position:absolute; right:8px; top:8px; font-size:12px; color:var(--brand); background:#fff; border:1px solid var(--line); border-radius:7px; padding:3px 9px; }
    .sigbox .ph { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#b0b8c5; font-size:13px; pointer-events:none; }
    .bar { position:fixed; left:0; right:0; bottom:0; background:var(--panel); border-top:1px solid var(--line); padding:12px; }
    .bar .inner { max-width:440px; margin:0 auto; }
    .submit { width:100%; height:48px; border:none; border-radius:11px; font-size:16px; font-weight:600; color:#fff; background:var(--brand); }
    .submit:disabled { background:#aebfdc; }
    .hint { font-size:11px; color:var(--muted); text-align:center; margin-top:6px; }
    .full { max-width:420px; margin:60px auto; text-align:center; padding:0 20px; }
    .full .ic { font-size:46px; } .full h2 { font-size:18px; } .full p { color:var(--muted); font-size:14px; }
    .hidden { display:none !important; }
    .toast { position:fixed; bottom:84px; left:50%; transform:translateX(-50%); background:#1f2733; color:#fff; padding:11px 16px; border-radius:10px; font-size:13px; z-index:20; max-width:90%; text-align:center; }
  </style>
</head>
<body>
  <div id="app" class="wrap hidden">
    <div class="head">
      <div class="logo">✍️</div>
      <h1 id="title">동의서</h1>
      <div class="dl" id="deadline"></div>
      <div id="redo" class="redo hidden">이미 작성한 내용을 불러왔습니다. 마감 전까지 수정할 수 있어요.</div>
    </div>

    <div class="pdfwrap">
      <div class="cap" id="pdfcap">문서 미리보기</div>
      <div id="pages"></div>
    </div>

    <div class="card">
      <h2>작성 항목</h2>
      <div id="form"></div>
    </div>
  </div>

  <div id="blocked" class="full hidden">
    <div class="ic">🔒</div>
    <h2 id="blockedTitle">링크를 사용할 수 없습니다</h2>
    <p id="blockedMsg"></p>
  </div>

  <div id="done" class="full hidden">
    <div class="ic">✅</div>
    <h2>서명 완료</h2>
    <p>제출되었습니다. 창을 닫으셔도 됩니다.</p>
    <p id="doneRedo" class="hidden" style="color:var(--brand)"></p>
  </div>

  <div id="bar" class="bar hidden">
    <div class="inner">
      <button id="submitBtn" class="submit" disabled>서명 완료</button>
      <div class="hint" id="barHint">필수 항목(*)을 모두 채우면 제출할 수 있어요</div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    if (window['pdfjsLib']) window['pdfjsLib'].GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
  <script src="/form.js"></script>
</body>
</html>
