<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>석암 전자서명 · 작성</title>
  <style>
    :root { --bg:#f4f6fa; --panel:#fff; --line:#e2e7ef; --ink:#1f2733; --muted:#6b7686; --brand:#2f6df4; --req:#e23b3b; --ok:#1c7a40; --done:#2f6df4; --shadow:0 1px 3px rgba(20,30,50,.08),0 6px 18px rgba(20,30,50,.05); }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { margin:0; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--ink); }
    .wrap { max-width:460px; margin:0 auto; padding:12px 10px 100px; }
    .head { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:13px 15px; margin-bottom:10px; box-shadow:var(--shadow); }
    .head .logo { font-size:20px; }
    .head h1 { font-size:15px; margin:5px 0 2px; }
    .head .dl { font-size:12px; color:var(--muted); }
    .memo { background:#eef4ff; border:1px solid #cfe0ff; color:#1f54c8; font-size:12.5px; line-height:1.55; padding:10px 13px; border-radius:12px; margin-bottom:10px; }
    .pages { display:flex; flex-direction:column; gap:12px; align-items:center; }
    .page-wrap { position:relative; box-shadow:var(--shadow); background:#fff; line-height:0; border-radius:4px; overflow:hidden; }
    .page-wrap canvas { display:block; width:100%; height:auto; }
    .ov { position:absolute; inset:0; }
    .fb { position:absolute; box-sizing:border-box; border:1.5px solid var(--req); background:rgba(226,75,75,.06); border-radius:4px; cursor:pointer; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .fb.opt { border-color:#9aa6ba; background:rgba(120,134,160,.05); }
    .fb.done { border-color:var(--done); background:rgba(47,109,244,.06); }
    .fb .val { font-size:11px; color:#15203a; padding:0 3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; line-height:1.1; }
    .fb .chk { color:var(--ok); font-weight:700; font-size:14px; }
    .fb .chk.radio { color:var(--done); }
    .fb img { max-width:100%; max-height:100%; object-fit:contain; }
    .fb .pin { position:absolute; top:-7px; left:-2px; font-size:9px; line-height:13px; padding:0 4px; border-radius:3px; background:var(--req); color:#fff; }
    .fb.opt .pin { background:#9aa6ba; } .fb.done .pin { background:var(--done); }
    .bar { position:fixed; left:0; right:0; bottom:0; background:var(--panel); border-top:1px solid var(--line); padding:11px 12px; z-index:30; }
    .bar .inner { max-width:460px; margin:0 auto; display:flex; align-items:center; gap:10px; }
    .bar .left { flex:1; font-size:12.5px; }
    .bar .left.req { color:var(--req); } .bar .left.ok { color:var(--ok); }
    .submit { height:46px; border:none; border-radius:11px; font-size:15px; font-weight:600; color:#fff; background:var(--brand); padding:0 22px; }
    .submit:disabled { background:#aebfdc; }
    /* 모달(바텀시트) */
    .sheet-bg { position:fixed; inset:0; background:rgba(20,30,50,.45); z-index:40; display:none; align-items:flex-end; justify-content:center; }
    .sheet-bg.show { display:flex; }
    .sheet { width:100%; max-width:460px; background:var(--panel); border-radius:16px 16px 0 0; padding:16px 16px 20px; }
    .sheet h2 { font-size:15px; margin:0 0 2px; }
    .sheet .sub { font-size:12px; color:var(--muted); margin:0 0 12px; }
    .sheet input[type=text], .sheet input[type=date] { width:100%; height:46px; border:1px solid var(--line); border-radius:10px; padding:0 13px; font-size:16px; }
    .sheet input:focus { outline:none; border-color:var(--brand); box-shadow:0 0 0 3px rgba(47,109,244,.12); }
    .copytarget { font-size:13px; color:#333; background:#f3f6fb; border-radius:8px; padding:8px 11px; margin-bottom:8px; }
    .match { font-size:12px; margin-top:6px; }
    .match.ok { color:var(--ok); } .match.no { color:var(--muted); }
    .sigpad { height:150px; border:1px dashed #b9c4d6; border-radius:10px; background:#fafbfd; position:relative; }
    .sigpad canvas { width:100%; height:150px; display:block; border-radius:10px; touch-action:none; }
    .sigpad .reuse { position:absolute; left:8px; top:8px; font-size:12px; background:var(--brand); color:#fff; border:none; border-radius:7px; padding:5px 10px; }
    .sigpad .clr { position:absolute; right:8px; top:8px; font-size:12px; background:#fff; border:1px solid var(--line); border-radius:7px; padding:5px 10px; }
    .sigpad .ph { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#b0b8c5; font-size:13px; pointer-events:none; }
    .sheet-actions { display:flex; gap:8px; margin-top:14px; }
    .sheet-actions button { height:46px; border-radius:11px; font-size:15px; border:1px solid var(--line); background:#fff; }
    .sheet-actions .ok { flex:2; background:var(--brand); color:#fff; border:none; font-weight:600; }
    .sheet-actions .cancel { flex:1; }
    .full { max-width:420px; margin:60px auto; text-align:center; padding:0 20px; }
    .full .ic { font-size:46px; } .full h2 { font-size:18px; } .full p { color:var(--muted); font-size:14px; }
    .hidden { display:none !important; }
    .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#1f2733; color:#fff; padding:11px 16px; border-radius:10px; font-size:13px; z-index:60; max-width:90%; text-align:center; }
  </style>
</head>
<body>
  <div id="app" class="wrap hidden">
    <div class="head">
      <div class="logo">✍️</div>
      <h1 id="title">동의서</h1>
      <div class="dl" id="deadline"></div>
    </div>
    <div id="memoBox" class="memo hidden"></div>
    <div id="hint" class="memo" style="background:#fff7e6;border-color:#ffe0a3;color:#9a6a00">빈칸(빨강)을 직접 눌러 작성하세요. 체크는 바로, 글자·서명은 큰 창이 뜹니다.</div>
    <div id="pages" class="pages"></div>
  </div>

  <div id="blocked" class="full hidden">
    <div class="ic">🔒</div><h2 id="blockedTitle">링크를 사용할 수 없습니다</h2><p id="blockedMsg"></p>
  </div>
  <div id="done" class="full hidden">
    <div class="ic">✅</div><h2>서명 완료</h2><p>제출되었습니다. 창을 닫으셔도 됩니다.</p>
    <p id="doneRedo" class="hidden" style="color:var(--brand)"></p>
  </div>

  <div id="bar" class="bar hidden">
    <div class="inner">
      <span id="barHint" class="left req">남은 필수 항목을 확인하세요</span>
      <button id="submitBtn" class="submit" disabled>서명 완료</button>
    </div>
  </div>

  <div id="sheet" class="sheet-bg">
    <div class="sheet" id="sheetInner"></div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    if (window['pdfjsLib']) window['pdfjsLib'].GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
  <script src="/form.js"></script>
</body>
</html>
