<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>석암 전자서명 · 링크 만들기</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .wrap { max-width: 720px; margin: 22px auto; padding: 0 16px; }
    .card { background: #fff; border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow); padding: 18px 20px; margin-bottom: 16px; }
    .card h3 { margin: 0 0 4px; font-size: 16px; }
    .sub { font-size: 13px; color: var(--muted); margin: 0 0 14px; }
    .frow { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border: 1px solid var(--line); border-radius: 9px; margin-bottom: 8px; }
    .frow .fmeta { font-size: 11px; color: var(--muted); margin-left: 6px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 8px; vertical-align: middle; }
    .dot.req { background: var(--req); } .dot.opt { background: #c4cede; }
    .sw { width: 38px; height: 22px; border-radius: 11px; background: #c4cede; position: relative; cursor: pointer; flex-shrink: 0; transition: .15s; }
    .sw.on { background: var(--brand); } .sw.on.req { background: var(--req); }
    .sw .knob { position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: .15s; }
    .sw.on .knob { left: 18px; }
    .pills { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 0; }
    .pill { padding: 8px 16px; font-size: 13px; border: 1px solid var(--line); border-radius: 9px; cursor: pointer; }
    .pill.active { border: 2px solid var(--brand); background: #eef4ff; color: var(--brand); font-weight: 600; padding: 7px 15px; }
    .custom { display: flex; align-items: center; gap: 6px; padding: 4px 10px; font-size: 13px; border: 1px solid var(--line); border-radius: 9px; }
    .custom input { width: 50px; height: 28px; text-align: center; border: 1px solid var(--line); border-radius: 6px; }
    .twocol { display: flex; gap: 12px; margin-top: 14px; }
    .opt-box { flex: 1; padding: 11px 13px; background: #f7f9fc; border-radius: 9px; }
    .opt-box .t { font-size: 13px; font-weight: 600; }
    .opt-box .d { font-size: 11.5px; color: var(--muted); }
    .opt-box input { width: 100%; height: 32px; text-align: center; border: 1px solid var(--line); border-radius: 7px; margin-top: 4px; }
    .gen { width: 100%; height: 44px; margin-top: 16px; font-size: 14px; }
    .linkrow { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-bottom: 1px solid var(--line); }
    .linkrow:last-child { border-bottom: none; }
    .linkrow .seq { font-size: 12px; color: var(--muted); width: 30px; }
    .linkrow .url { flex: 1; font-size: 12.5px; color: var(--brand); word-break: break-all; }
    .linkrow .url.closed { color: var(--muted); text-decoration: line-through; }
    .chip { font-size: 11px; padding: 2px 9px; border-radius: 11px; white-space: nowrap; }
    .chip.open { background: #eef2f8; color: var(--muted); }
    .chip.done { background: #e6f6ec; color: #1c7a40; }
    .chip.closed { background: #fdeaea; color: var(--req); }
    .chip.expired { background: #fff3da; color: #9a6a00; }
    .ico { cursor: pointer; color: var(--muted); font-size: 15px; background: none; border: none; padding: 4px; }
    .ico:hover { color: var(--brand); }
    .toggle-link { font-size: 11.5px; cursor: pointer; color: var(--brand); white-space: nowrap; }
    .listhdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .qrbox { text-align: center; padding: 10px; }
    .modal-bg { position: fixed; inset: 0; background: rgba(20,30,50,.45); display: none; align-items: center; justify-content: center; z-index: 60; }
    .modal-bg.show { display: flex; }
    .modal { background: #fff; border-radius: 14px; padding: 20px; text-align: center; max-width: 300px; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">✍️</span>
      <div><div class="brand-title">석암 전자서명</div><div class="brand-sub">링크 만들기</div></div>
    </div>
    <div class="top-actions">
      <span id="storeBadge" class="store-badge">…</span>
      <a id="subsBtn" class="btn" href="#">제출 현황 →</a>
      <a id="backBtn" class="btn" href="/">← 문서 편집</a>
    </div>
  </header>

  <div class="wrap">
    <div class="card">
      <h3 id="docTitle">문서</h3>
      <p class="sub" id="docSub"></p>
    </div>

    <div class="card">
      <h3>필수 항목 설정</h3>
      <p class="sub">빨강 = 필수. 여기서 켠 상태가 학부모 작성 화면에 적용됩니다.</p>
      <div id="fieldList"></div>
      <button id="saveReq" class="btn" style="margin-top:6px">필수 설정 저장</button>
    </div>

    <div class="card">
      <h3>링크 발급</h3>
      <p class="sub">만료 기간과 옵션을 정하고 링크를 만드세요.</p>

      <div style="font-size:13px;font-weight:600;margin-top:6px">만료 기간</div>
      <div class="pills" id="periodPills">
        <span class="pill" data-days="1">1일</span>
        <span class="pill active" data-days="3">3일</span>
        <span class="pill" data-days="5">5일</span>
        <span class="pill" data-days="7">7일</span>
        <span class="custom">직접 <input id="customDays" type="number" min="1" max="365" placeholder="14" /> 일</span>
      </div>

      <div class="twocol">
        <div class="opt-box" style="display:flex;align-items:center;justify-content:space-between">
          <div><div class="t">1회용</div><div class="d">제출 시 자동 닫힘</div></div>
          <div id="oneTimeSw" class="sw on"><div class="knob"></div></div>
        </div>
        <div class="opt-box">
          <div class="t">만들 링크 수</div>
          <input id="linkCount" type="number" min="1" max="200" value="1" />
          <div class="d">학부모마다 다른 링크</div>
        </div>
      </div>

      <button id="genBtn" class="btn btn-primary gen">링크 만들기</button>
    </div>

    <div class="card" id="listCard" style="display:none">
      <div class="listhdr">
        <h3 style="margin:0">생성된 링크 <span id="deadline" class="sub" style="display:inline"></span></h3>
        <button id="copyAll" class="btn" style="padding:6px 12px">전체 안내문구 복사</button>
      </div>
      <div id="linkList"></div>
    </div>
  </div>

  <div id="qrModal" class="modal-bg">
    <div class="modal">
      <div id="qrBox" class="qrbox"></div>
      <div id="qrUrl" style="font-size:12px;color:var(--muted);word-break:break-all;margin:8px 0"></div>
      <button class="btn" onclick="document.getElementById('qrModal').classList.remove('show')">닫기</button>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="/links.js"></script>
</body>
</html>
